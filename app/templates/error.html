<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error {{ status_code }} — BookIt</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #F6F3EC;
      background-image: radial-gradient(circle at 20% 20%, rgba(184,69,31,0.08), transparent 50%),
                         radial-gradient(circle at 85% 80%, rgba(20,125,111,0.06), transparent 50%);
      color: #201A14;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .box { text-align: center; max-width: 380px; padding: 2rem; }
    .code {
      font-family: 'Fraunces', serif; font-size: 4.5rem; font-weight: 600; line-height: 1;
      color: #B8451F;
    }
    .detail { color: #7C7166; margin: 0.9rem 0 1.6rem; font-size: 0.92rem; }
    a.btn {
      display: inline-block; background: #B8451F;
      color: #fff; padding: 0.65rem 1.4rem; border-radius: 8px; text-decoration: none;
      font-weight: 600; font-size: 0.88rem; box-shadow: 0 4px 14px rgba(184,69,31,0.28);
    }
    a.btn:hover { background: #8F3416; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">{{ status_code }}</div>
    <p class="detail">{{ detail }}</p>
    <a href="/dashboard" class="btn">Back to dashboard</a>
  </div>
</body>
</html>
