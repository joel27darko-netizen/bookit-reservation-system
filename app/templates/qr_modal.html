<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Check-in QR — {{ booking.resource.name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #F6F3EC;
      background-image: radial-gradient(circle at 15% 10%, rgba(184,69,31,0.07), transparent 50%),
                         radial-gradient(circle at 90% 85%, rgba(20,125,111,0.05), transparent 50%);
      color: #201A14;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .ticket {
      background: #FFFFFF;
      border: 1px solid rgba(38,32,24,0.10);
      border-radius: 18px;
      box-shadow: 0 0 0 1px rgba(184,69,31,0.10), 0 20px 50px rgba(38,32,24,0.12);
      padding: 2.1rem 2.3rem;
      width: 340px;
      text-align: center;
    }
    .ticket .brand {
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.05rem;
      color: #B8451F;
      margin-bottom: 1.2rem;
    }
    .ticket h1 { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 600; margin: 0 0 0.15rem; color: #201A14; }
    .ticket .sub { color: #7C7166; font-size: 0.82rem; margin-bottom: 1.3rem; }
    .ticket img { width: 200px; height: 200px; border-radius: 12px; background: #fff; padding: 10px; border: 1px solid rgba(38,32,24,0.08); }
    .ticket .ref { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #7C7166; margin-top: 1.1rem; word-break: break-all; }
    .ticket .meta { text-align: left; margin-top: 1.3rem; font-size: 0.82rem; border-top: 1px dashed rgba(38,32,24,0.14); padding-top: 1rem; }
    .ticket .meta div { display: flex; justify-content: space-between; padding: 0.22rem 0; color: #4A4038; }
    .ticket .meta strong { color: #201A14; font-weight: 600; }
    .print-btn {
      margin-top: 1.3rem; width: 100%; padding: 0.6rem;
      background: #B8451F;
      color: #fff; border: none; border-radius: 9px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer;
      box-shadow: 0 4px 14px rgba(184,69,31,0.28);
    }
    .print-btn:hover { background: #8F3416; }
    @media print { .print-btn { display: none; } body { background: #fff; color:#000; } .ticket { box-shadow: none; border-color:#ddd; } }
  </style>
</head>
<body>
  <div class="ticket">
    <div class="brand">● BookIt</div>
    <h1>{{ booking.resource.name }}</h1>
    <div class="sub">Present this code at check-in</div>
    <img src="{{ qr_data_uri }}" alt="Booking QR code">
    <div class="ref">{{ booking.reference }}</div>
    <div class="meta">
      <div><span>Guest</span><strong>{{ booking.customer.full_name }}</strong></div>
      <div><span>Starts</span><strong>{{ booking.start_time.strftime('%b %d, %H:%M') }}</strong></div>
      <div><span>Ends</span><strong>{{ booking.end_time.strftime('%b %d, %H:%M') }}</strong></div>
      <div><span>Party size</span><strong>{{ booking.party_size }}</strong></div>
    </div>
    <button class="print-btn" onclick="window.print()">Print / save as PDF</button>
  </div>
</body>
</html>
